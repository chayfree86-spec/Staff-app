<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/pwa-icon.png" />
    <link rel="apple-touch-icon" href="/pwa-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FAF9FF" />

    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Staff App" />
    <link rel="apple-touch-startup-image" href="/splashbg.png" />

    <!-- Paint the app's background instantly, before any CSS/JS loads, so a
         reload never shows a blank white frame ahead of the splash screen. -->
    <style>
      html, body {
        background-color: #FAF9FF;
        margin: 0;
        padding: 0;
      }
    </style>

    <title>Staff App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration with Auto-Reload on Update -->
    <script>
      if ('serviceWorker' in navigator) {
        // When a newly installed worker takes control, reload once so the page
        // is running the freshly deployed build. The guard prevents a loop.
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });

        window.addEventListener('load', () => {
          // updateViaCache:'none' -> the browser never serves sw.js from its
          // HTTP cache, so a new deploy is detected reliably.
          navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
            .then((reg) => {
              // Force an update check on every page load so a freshly deployed
              // build is picked up immediately, not on the browser's own schedule.
              reg.update();

              // If a new worker is found and finishes installing, tell it to
              // activate at once; that triggers controllerchange -> reload above.
              reg.addEventListener('updatefound', () => {
                const worker = reg.installing;
                if (!worker) return;
                worker.addEventListener('statechange', () => {
                  if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                    worker.postMessage('SKIP_WAITING');
                  }
                });
              });
            })
            .catch((err) => console.error('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
