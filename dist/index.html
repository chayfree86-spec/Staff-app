<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/pwa-icon.png" />
    <link rel="apple-touch-icon" href="/pwa-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FAF9FF" />

    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Staff App" />
    <link rel="apple-touch-startup-image" href="/splashbg.png" />

    <!-- Paint the app's background instantly, before any CSS/JS loads, so a
         reload never shows a blank white frame ahead of the splash screen. -->
    <style>
      html, body {
        background-color: #FAF9FF;
        margin: 0;
        padding: 0;
      }
    </style>

    <title>Staff App</title>
    <script type="module" crossorigin src="/assets/index-cLHZAEJV.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DEG3W67L.css">
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Service Worker Registration with Auto-Reload on Update -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('SW registered:', reg.scope);
              
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                if (installingWorker) {
                  installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed') {
                      if (navigator.serviceWorker.controller) {
                        console.log('New update installed. Reloading page...');
                        window.location.reload();
                      }
                    }
                  };
                }
              };
            })
            .catch((err) => {
              console.error('SW registration failed:', err);
            });
        });

        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      }
    </script>
  </body>
</html>
